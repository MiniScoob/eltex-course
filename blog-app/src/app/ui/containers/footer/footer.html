<footer class="footer">
  <div class="footer__content">
    <div class="footer__left-block">
      <section id="contacts">
        <h2 class="lead-title">Контакты</h2>
        <address class="footer__address">
            <p>
                Email: <a href="mailto:user@example.com">user@example.com</a>
            </p>
            <p>
                Телефон: <a href="tel:+78005553535">+7 (800) 555-35-35</a>
            </p>
        </address>
      </section>
      <section>
        <h2 class="lead-title">Социальные сети</h2>
        <ul class="footer__list">
            <li>
                <a
                  class="footer__link"
                  href="https://github.com/MiniScoob"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                    <img src="icons/github.svg" alt="Иконка Github" />
                </a>
            </li>
            <li>
                <a
                  class="footer__link"
                  href="https://t.me"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                    <img src="icons/telegram.svg" alt="Иконка Telegram" />
                </a>
            </li>
        </ul>
      </section>
    </div>
    <form class="footer__form">
      <p>
        <label for="contacts-email">Email</label>
        <br />
        <input
          id="contacts-email"
          type="email"
          name="contacts-email"
          inputmode="email"
          autocomplete="email"
          placeholder="Ваш email-адрес"
          required
        />
      </p>
      <p>
        <label for="contacts-message">Сообщение</label>
        <br />
        <textarea
          id="contacts-message"
          name="contacts-message"
          placeholder="Ваше послание мне"
          rows="5"
          required
        ></textarea>
      </p>
      <button class="button" type="submit">
        Отправить
      </button>
    </form>
  </div>
</footer>
