<header class="header">
    <div class="header__content">
        <p class="header__title">MiniScoob.io</p>
        <nav>
            <ul class="header__list">
                @for (link of navLinks; track $index) {
                    <li>
                        <a class="header__link" [routerLink]="link.href">
                            {{ link.label }}
                        </a>
                    </li>
                }
            </ul>
        </nav>
    </div>
</header>
